syntax = "proto3";

package atol.api.v1;

option go_package = "atol.sh/sdk-go/gen/go/atol/api/v1;apiv1";

// AccessService — SDK-facing subset for tuple management.
// The full AccessService lives in the control plane proto; the SDK only
// needs GrantAccess and RevokeAccess for write-through tuple persistence.
service AccessService {
  rpc GrantAccess(GrantAccessRequest) returns (GrantAccessResponse);
  rpc RevokeAccess(RevokeAccessRequest) returns (RevokeAccessResponse);
}

message GrantAccessRequest {
  string org_id = 1;
  string user = 2;
  string relation = 3;
  string object = 4;
  string condition = 5;
}

message GrantAccessResponse {}

message RevokeAccessRequest {
  string org_id = 1;
  string user = 2;
  string relation = 3;
  string object = 4;
}

message RevokeAccessResponse {}
